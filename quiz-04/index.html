<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog Breeds</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Dog Breeds Directory</h1>
      <p>Browse dog breeds and view their profiles.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>All Breeds</h2>
      <p class="subtext">Click a breed to view its profile page.</p>

      <div id="statusMessage" class="status">Loading breeds...</div>
      <div id="breedList" class="breed-list"></div>
    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
